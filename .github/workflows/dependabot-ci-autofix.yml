name: Dependabot CI Auto-Fix Trigger

on:
  workflow_run:
    workflows:
      - CI / Unit Tests
      - CI / Integration Test w/ Coverage
      - CI / E2E Test w/ Coverage
      - CodeQL Advanced
    types:
      - completed

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  request-copilot-fix-and-rerun:
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot fix for failed Dependabot chore(deps) PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run
            if (!run.pull_requests || run.pull_requests.length === 0) {
              core.info('No PR associated with this workflow run; skipping.')
              return
            }

            const prNumber = run.pull_requests[0].number
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })

            const isDependabot = pr.user?.login === 'dependabot[bot]'
            const isChoreDeps = /^chore\(deps\)/i.test(pr.title || '')

            if (!isDependabot || !isChoreDeps) {
              core.info(`Skipping PR #${prNumber}: dependabot=${isDependabot}, chore(deps)=${isChoreDeps}`)
              return
            }

            const marker = `<!-- dependabot-ci-autofix:${run.id} -->`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `${marker}\n@copilot CI workflow **${run.name}** failed for this Dependabot PR. Please investigate, apply the minimal fix, and push updates so auto-merge can proceed.\n\nFailed run: ${run.html_url}`,
            })

            await github.rest.actions.reRunWorkflowFailedJobs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            })

            core.info(`Requested Copilot fix and re-ran failed jobs for PR #${prNumber}`)
