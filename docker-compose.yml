version: '3.8'

networks:
    web:
      #external: true
      driver:  bridge

services:
    selenium-chrome:
        image: selenium/standalone-chrome:latest
        hostname: selenium-chrome
        networks:
          - web
        # privileged: true
        shm_size: 2g
        ports:
          - "4444:4444"
          - "7900:7900"
          #- "5900:5900"
        environment:
          - SE_NODE_MAX_SESSIONS=1
          - SE_NODE_SESSION_TIMEOUT=600
          - SE_LOG_LEVEL=WARN
          - SE_BROWSER_ARGS_USER_DATA_DIR=--user-data-dir=/home/seluser/chrome-profile
          - SE_BROWSER_ARGS_PROFILE=--profile-directory=Default
        volumes:
          - ./chrome-profile:/home/seluser/chrome-profile
        restart: unless-stopped
        deploy:
          resources:
            limits:
              cpus: '2.0'
              memory: 4g
        healthcheck:
          test: ["CMD-SHELL", "curl -fsS http://localhost:4444/wd/hub/status >/dev/null || exit 1"]
          interval: 30s
          timeout: 10s
          retries: 5
          start_period: 20s
